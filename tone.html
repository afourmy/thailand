<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tone Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="nav.js"></script>

  <main class="tone-main">
    <header class="page-banner tone-banner">
      <h1>Tone Practice</h1>
    </header>

    <p class="tone-intro">Say the word out loud, then compare your pitch against the reference. Your falling tone should actually fall.</p>

    <div class="tone-controls">
      <div class="tone-search-row">
        <input type="search" id="tone-search" class="vocab-search" placeholder="Search a word…" autocomplete="off" list="tone-datalist">
        <datalist id="tone-datalist"></datalist>
        <button id="tone-random" class="tone-btn tone-btn--ghost" type="button">Random</button>
      </div>
      <details class="tone-freq">
        <summary>
          <span class="fc-setting-label">Frequencies</span>
          <svg class="fc-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="fc-chips" id="tone-freq-chips"></div>
      </details>
    </div>

    <section class="tone-card" id="tone-card" hidden>
      <div class="tone-word" id="tone-word"></div>
      <div class="tone-en" id="tone-en"></div>
      <span class="tone-freq-tag" id="tone-freq-tag" hidden></span>

      <div class="tone-actions">
        <button id="tone-play-ref" class="tone-btn" type="button" aria-label="Play reference">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span>Reference</span>
        </button>
        <button id="tone-record" class="tone-btn tone-btn--rec" type="button" aria-label="Record">
          <span class="tone-rec-dot"></span>
          <span class="tone-rec-label">Record</span>
        </button>
        <button id="tone-play-you" class="tone-btn" type="button" aria-label="Play your recording" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span>You</span>
        </button>
      </div>

      <p class="tone-status" id="tone-status"></p>
    </section>

    <section class="tone-result" id="tone-result" hidden>
      <div class="tone-scorebar">
        <div class="tone-score" id="tone-score"></div>
        <div class="tone-verdict" id="tone-verdict"></div>
      </div>
      <div class="tone-chart-wrap">
        <canvas id="tone-canvas" class="tone-canvas"></canvas>
      </div>
      <div class="tone-legend">
        <span class="tone-legend-item tone-legend--ref"><span class="tone-swatch"></span>Reference</span>
        <span class="tone-legend-item tone-legend--you"><span class="tone-swatch"></span>You</span>
      </div>
      <p class="tone-hint" id="tone-hint"></p>
    </section>
  </main>

  <script src="tone.js"></script>
  <script>TONE.init();</script>
</body>
</html>
