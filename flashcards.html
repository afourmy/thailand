<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dreampulse/computer-modern-web-font@master/fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="nav.js"></script>

  <main class="fc-main">
    <!-- Home / setup screen -->
    <section class="fc-screen fc-home" id="fc-home" hidden>
      <header class="page-banner fc-banner">
        <h1>Flashcards</h1>
      </header>

      <div class="fc-stats" id="fc-stats">
        <div class="fc-stat fc-stat--due"><span class="fc-stat-num" data-stat="due">0</span><span class="fc-stat-label">Due</span></div>
        <div class="fc-stat fc-stat--new"><span class="fc-stat-num" data-stat="new">0</span><span class="fc-stat-label">New</span></div>
        <div class="fc-stat fc-stat--left"><span class="fc-stat-num" data-stat="left">0</span><span class="fc-stat-label">Left</span></div>
        <div class="fc-stat fc-stat--suspended"><span class="fc-stat-num" data-stat="suspended">0</span><span class="fc-stat-label">Suspended</span></div>
      </div>

      <div class="fc-settings" id="fc-settings">
        <div class="fc-setting">
          <span class="fc-setting-label">Deck</span>
          <select id="fc-deck-select" class="vocab-deck-select" style="margin-left:auto" aria-label="Select deck"></select>
        </div>

        <div class="fc-setting">
          <span class="fc-setting-label">New cards per day</span>
          <div class="fc-stepper">
            <button type="button" data-step="-5" aria-label="Fewer">&minus;</button>
            <input type="number" id="fc-new-per-day" class="fc-stepper-val" value="15" min="0" max="99999" inputmode="numeric">
            <button type="button" data-step="5" aria-label="More">+</button>
          </div>
        </div>

        <div class="fc-setting">
          <span class="fc-setting-label">Direction</span>
          <button type="button" class="fc-info" aria-label="What is Direction?">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span class="fc-info-bubble" role="tooltip">Get quizzed from English, from Thai, or both.</span>
          </button>
          <select id="fc-direction-select" class="vocab-deck-select" style="margin-left:auto" aria-label="Card direction">
            <option value="both">Both</option>
            <option value="e2t">English &rarr; Thai</option>
            <option value="t2e">Thai &rarr; English</option>
          </select>
        </div>

        <div class="fc-setting">
          <span class="fc-setting-label">Listening mode</span>
          <button type="button" class="fc-info" aria-label="What is Listening mode?">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span class="fc-info-bubble" role="tooltip">Hides the Thai word and just plays its sound, so you practise listening. Tap the card to show the word.</span>
          </button>
          <label class="fc-switch" style="margin-left:auto">
            <input type="checkbox" id="fc-listening">
            <span class="fc-switch-track"><span class="fc-switch-thumb"></span></span>
          </label>
        </div>

        <div class="fc-setting">
          <span class="fc-setting-label">Type Thai</span>
          <button type="button" class="fc-info" aria-label="What is Type Thai?">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <span class="fc-info-bubble" role="tooltip">On English&rarr;Thai cards, type the Thai word (checked against the spelling) instead of just rating your recall. No effect on Thai&rarr;English cards.</span>
          </button>
          <label class="fc-switch" style="margin-left:auto">
            <input type="checkbox" id="fc-type-mode">
            <span class="fc-switch-track"><span class="fc-switch-thumb"></span></span>
          </label>
        </div>

      </div>

      <button class="fc-start" id="fc-start" type="button">Start studying</button>
      <p class="fc-done-note" id="fc-home-note" hidden>Nothing to study with the current filters.</p>
    </section>

    <!-- Review screen -->
    <section class="fc-screen fc-review" id="fc-review" hidden>
      <div class="fc-review-top">
        <button class="fc-exit" id="fc-exit" type="button" aria-label="End session">&times;</button>
        <div class="fc-progress"><div class="fc-progress-bar" id="fc-progress-bar"></div></div>
        <span class="fc-remaining" id="fc-remaining"></span>
      </div>

      <div class="fc-card-wrap">
        <div class="fc-card" id="fc-card">
          <div class="fc-card-body">
            <div class="fc-card-face fc-card-front" id="fc-front"></div>
            <div class="fc-card-divider" id="fc-divider" hidden></div>
            <div class="fc-card-face fc-card-back" id="fc-back" hidden></div>
          </div>
          <div class="fc-tools">
            <button class="fc-speak" id="fc-speak" type="button" aria-label="Play pronunciation" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            </button>
            <button class="fc-copy" id="fc-copy" type="button" aria-label="Copy word" title="Copy word" hidden>
              <svg class="fc-copy-i fc-copy-i--copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <svg class="fc-copy-i fc-copy-i--check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="fc-suspend" id="fc-suspend" type="button" aria-label="Suspend this card" title="Suspend / Unsuspend">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="5.5" y1="5.5" x2="18.5" y2="18.5"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="fc-produce" id="fc-produce" hidden>
        <input type="text" id="fc-type-input" class="fc-type-input" lang="th"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               placeholder="Type the Thai…" aria-label="Type the Thai word" hidden>
        <div class="fc-type-result" id="fc-type-result" hidden></div>
      </div>

      <div class="fc-actions">
        <button class="fc-show" id="fc-show" type="button">Show answer</button>
        <div class="fc-grades" id="fc-grades" hidden>
          <button class="fc-grade fc-grade--again" type="button" data-grade="1">Again<span class="fc-grade-ivl" data-ivl="1"></span></button>
          <button class="fc-grade fc-grade--hard" type="button" data-grade="2">Hard<span class="fc-grade-ivl" data-ivl="2"></span></button>
          <button class="fc-grade fc-grade--good" type="button" data-grade="3">Good<span class="fc-grade-ivl" data-ivl="3"></span></button>
          <button class="fc-grade fc-grade--easy" type="button" data-grade="4">Easy<span class="fc-grade-ivl" data-ivl="4"></span></button>
        </div>
      </div>
    </section>

    <!-- Done screen -->
    <section class="fc-screen fc-done" id="fc-done" hidden>
      <div class="fc-done-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="fc-done-title">You're done for today</h2>
      <p class="fc-done-sub" id="fc-done-sub"></p>
      <button class="fc-start fc-start--again" id="fc-home-link" type="button">Back to start</button>
    </section>
  </main>

  <script src="fsrs.js"></script>
  <script src="flashcards.js"></script>
  <script>FLASHCARDS.init();</script>
</body>
</html>
